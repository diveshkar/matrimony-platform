version: '3.9'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
    environment:
      - VITE_API_BASE_URL=http://localhost:4000
      - VITE_S3_BUCKET_URL=http://localhost:4566
    depends_on:
      - dynamodb-local

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    ports:
      - '8000:8000'
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-inMemory']
    healthcheck:
      test: ['CMD-SHELL', "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000 || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    ports:
      - '8001:8001'
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=ap-south-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      dynamodb-local:
        condition: service_healthy
