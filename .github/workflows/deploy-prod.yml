name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1

jobs:
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "Production deployment not confirmed. Input was: ${{ github.event.inputs.confirm }}"
          exit 1

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate]
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:web
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}

      - run: pnpm run build:backend

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Deploy frontend to S3
      - name: Deploy frontend
        run: |
          aws s3 sync web/dist/ s3://matrimony-prod-frontend --delete
          aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} --paths "/*"

      # Terraform apply
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6"

      - name: Terraform apply
        working-directory: infra/environments/prod
        run: |
          terraform init
          terraform apply -auto-approve
