name: Deploy Stage

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-stage
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    environment: stage
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:web
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Package Lambda functions + layer, upload to S3
      - name: Package and upload Lambda functions
        run: bash scripts/package-lambdas.sh ${{ vars.LAMBDA_S3_BUCKET }}

      # Terraform apply (deploys infra, Lambda reads code from S3)
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6'

      - name: Terraform apply
        working-directory: infra/environments/stage
        env:
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_certificate_arn: ${{ secrets.CERTIFICATE_ARN }}
          TF_VAR_alarm_email: ${{ vars.ALARM_EMAIL }}
        run: |
          terraform init
          terraform apply -auto-approve

      # Deploy frontend to S3
      - name: Deploy frontend
        run: |
          aws s3 sync web/dist/ s3://matrimony-stage-frontend --delete
          aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} --paths "/*"
